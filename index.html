<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Health Challenge League</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family: system-ui, -apple-system, sans-serif;
}
</style>

</head>

<body class="bg-slate-900 text-white min-h-screen p-6">

<div class="max-w-5xl mx-auto space-y-6">

<!-- HEADER -->
<div>
<h1 class="text-4xl font-bold mb-1">
Health Challenge League
</h1>
<p class="text-slate-400">
Build healthy habits. Compete with friends.
</p>
</div>


<!-- AUTH BOX -->
<div id="auth-box" class="bg-slate-800 p-6 rounded-xl border border-slate-700 space-y-6 max-w-xl">

<div>
<h2 class="text-xl font-bold mb-2">Create Account</h2>

<input id="su-email" class="w-full p-3 mb-2 rounded bg-slate-900 border border-slate-700" placeholder="Email">

<input id="su-pass" type="password" class="w-full p-3 mb-2 rounded bg-slate-900 border border-slate-700" placeholder="Password">

<input id="su-name" class="w-full p-3 mb-2 rounded bg-slate-900 border border-slate-700" placeholder="Display name">

<input id="su-emoji" class="w-full p-3 mb-2 rounded bg-slate-900 border border-slate-700" placeholder="Avatar emoji (optional)">

<button id="btn-signup"
class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold p-3 rounded">
Sign Up
</button>

</div>


<hr class="border-slate-700">


<div>
<h2 class="text-xl font-bold mb-2">Log In</h2>

<input id="li-email" class="w-full p-3 mb-2 rounded bg-slate-900 border border-slate-700" placeholder="Email">

<input id="li-pass" type="password" class="w-full p-3 mb-2 rounded bg-slate-900 border border-slate-700" placeholder="Password">

<button id="btn-login"
class="w-full bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold p-3 rounded">
Log In
</button>

</div>

<div id="auth-msg" class="text-sm text-red-400"></div>

</div>


<!-- GAME DASHBOARD -->
<div id="game-box" class="hidden space-y-6">

<!-- TOP BAR -->
<div class="flex items-center justify-between bg-slate-800 border border-slate-700 rounded-xl p-4">

<div id="whoami" class="font-bold text-lg"></div>

<button id="btn-logout"
class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded">
Log Out
</button>

</div>


<!-- LEAGUES -->
<div id="leagues-box" class="bg-slate-800 border border-slate-700 rounded-xl p-6 space-y-4">

<div class="flex items-center justify-between">

<h2 class="text-2xl font-bold">Leagues</h2>

<button id="btn-open-league-modal"
class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded font-bold">
Create / Join League
</button>

</div>

<div id="leagues-list" class="space-y-3"></div>

</div>


<!-- HABITS SECTION -->
<div class="bg-slate-800 border border-slate-700 rounded-xl p-6">

<h2 class="text-2xl font-bold mb-3">
Daily Habits
</h2>

<p class="text-slate-400">
Log your habits here. Points count toward all leagues you're in.
</p>

</div>


</div>


<!-- LEAGUE MODAL -->
<div id="league-modal"
class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">

<div class="bg-slate-900 border border-slate-700 rounded-xl p-6 w-full max-w-md space-y-4">

<div class="flex justify-between items-center">

<h2 class="text-xl font-bold">
Leagues
</h2>

<button id="btn-close-league-modal" class="text-slate-400 hover:text-white">
✕
</button>

</div>


<!-- CREATE LEAGUE -->
<div class="space-y-2">

<div class="font-bold">Create League</div>

<input id="league-name"
class="w-full p-3 rounded bg-slate-800 border border-slate-700"
placeholder="League name">

<button id="btn-create-league"
class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold p-3 rounded">
Create League
</button>

</div>


<hr class="border-slate-700">


<!-- JOIN LEAGUE -->
<div class="space-y-2">

<div class="font-bold">Join League</div>

<input id="join-code"
class="w-full p-3 rounded bg-slate-800 border border-slate-700"
placeholder="Invite code">

<button id="btn-join-league"
class="w-full bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold p-3 rounded">
Join League
</button>

</div>

</div>

</div>


<!-- TOAST -->
<div id="toast" class="hidden">
<div id="toast-msg"></div>
</div>


</div>

<script src="app.js"></script>

</body>
</html>
