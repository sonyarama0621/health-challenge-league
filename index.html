<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Health Challenge League</title>

  <!-- Tailwind CDN (fine for MVP) -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>

  <!-- Supabase JS (must load BEFORE app.js) -->
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Outfit', sans-serif; }

    /* Grayed-out buttons when disabled */
    .btn-disabled {
      opacity: 0.45 !important;
      filter: grayscale(0.25);
      cursor: not-allowed !important;
      transform: none !important;
      box-shadow: none !important;
    }
  </style>
</head>

<body class="min-h-screen bg-slate-900 text-white p-6">
  <div class="max-w-3xl mx-auto">
    <header class="text-center mb-8">
      <h1 class="text-4xl md:text-5xl font-extrabold bg-gradient-to-r from-amber-400 via-orange-400 to-red-400 bg-clip-text text-transparent">
        Health Challenge League
      </h1>
      <p class="text-slate-400 mt-2">Create an account, verify your email, then log in to play.</p>
    </header>

    <!-- AUTH BOX -->
    <div id="auth-box" class="bg-slate-800/60 border border-slate-700 rounded-2xl p-6 space-y-6">
      <div class="space-y-2">
        <h2 class="text-xl font-bold">Create account</h2>

        <input id="su-email" type="email" placeholder="Email"
          class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-700" />
        <input id="su-pass" type="password" placeholder="Password"
          class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-700" />
        <input id="su-name" type="text" placeholder="Display name"
          class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-700" />

        <button id="btn-signup"
          class="w-full font-bold py-3 rounded-lg bg-emerald-500 hover:bg-emerald-400 text-slate-900 transition">
          Sign up (emails a verification link)
        </button>

        <p class="text-xs text-slate-400">
          After signup, check your inbox and click the verification link.
        </p>
      </div>

      <hr class="border-slate-700" />

      <div class="space-y-2">
        <h2 class="text-xl font-bold">Log in</h2>

        <input id="li-email" type="email" placeholder="Email"
          class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-700" />
        <input id="li-pass" type="password" placeholder="Password"
          class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-700" />

        <button id="btn-login"
          class="w-full font-bold py-3 rounded-lg bg-amber-500 hover:bg-amber-400 text-slate-900 transition">
          Log in
        </button>
      </div>

      <div id="auth-msg" class="text-sm text-slate-300 whitespace-pre-wrap"></div>
    </div>

    <!-- GAME BOX -->
    <div id="game-box" class="hidden bg-slate-800/60 border border-slate-700 rounded-2xl p-6 mt-6 space-y-6">
      <!-- Top bar -->
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
          <div class="text-slate-400 text-sm">Logged in as</div>
          <div id="whoami" class="text-xl font-bold"></div>
        </div>

        <button id="btn-logout" class="px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 transition">
          Log out
        </button>
      </div>

      <!-- Stats -->
      <div class="grid grid-cols-2 gap-4">
        <div class="bg-slate-900 border border-slate-700 rounded-xl p-4">
          <div class="text-slate-400 text-xs">Total Points</div>
          <div id="stat-points" class="text-3xl font-extrabold text-amber-400">0</div>
        </div>
        <div class="bg-slate-900 border border-slate-700 rounded-xl p-4">
          <div class="text-slate-400 text-xs">Current Streak</div>
          <div class="text-3xl font-extrabold text-emerald-400">
            <span id="stat-streak">0</span><span class="text-base font-bold text-slate-400"> days</span>
          </div>
        </div>
      </div>

      <!-- Habits -->
      <div class="bg-slate-900 border border-slate-700 rounded-2xl p-5 space-y-4">
        <div class="flex items-end justify-between">
          <div>
            <h2 class="text-2xl font-bold">Daily Habits</h2>
            <p class="text-slate-400 text-sm">Each habit can be logged once per day.</p>
          </div>
          <div class="text-xs text-slate-400">Steps: choose one</div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
          <button id="btn-log-water"
            class="px-4 py-4 rounded-xl bg-cyan-600 hover:bg-cyan-500 font-bold transition">
            💧 Water (+5)
